<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图书管理系统 - 登录 / 注册</title>
    <meta name="description" content="图书管理系统 - 请登录或注册以使用完整功能">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0; padding: 0; box-sizing: border-box;
        }

        :root {
            --primary: #7c3aed;
            --primary-light: #8b5cf6;
            --secondary: #0ea5e9;
            --accent: #f43f5e;
            --success: #22c55e;
            --danger: #ef4444;
            --glass-bg: rgba(13, 12, 34, 0.78);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text: #f1f5f9;
            --text-muted: rgba(255, 255, 255, 0.38);
            --input-bg: rgba(255, 255, 255, 0.055);
            --input-border: rgba(255, 255, 255, 0.1);
            --input-focus-border: rgba(124, 58, 237, 0.55);
            --input-focus-shadow: rgba(124, 58, 237, 0.15);
        }

        body {
            font-family: 'Inter', 'Microsoft YaHei', 'PingFang SC', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #060614;
            overflow: hidden;
            position: relative;
        }

        /* ── Animated Background ── */
        .bg-layer {
            position: fixed; inset: 0; z-index: 0;
        }

        /* Gradient base */
        .bg-gradient {
            position: absolute; inset: 0;
            background:
                radial-gradient(ellipse 800px 600px at 15% 40%, rgba(109, 40, 217, 0.28) 0%, transparent 60%),
                radial-gradient(ellipse 700px 500px at 85% 15%, rgba(6, 182, 212, 0.22) 0%, transparent 60%),
                radial-gradient(ellipse 600px 500px at 65% 85%, rgba(236, 72, 153, 0.18) 0%, transparent 60%),
                linear-gradient(160deg, #060614 0%, #0e0b2e 45%, #06101e 100%);
        }

        /* Floating orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
        }
        .orb-1 {
            width: 560px; height: 560px;
            background: radial-gradient(circle at 35% 35%, rgba(124, 58, 237, 0.38), transparent 65%);
            top: -180px; left: -180px;
            animation: orbFloat 9s ease-in-out infinite;
        }
        .orb-2 {
            width: 460px; height: 460px;
            background: radial-gradient(circle at 65% 65%, rgba(14, 165, 233, 0.32), transparent 65%);
            bottom: -140px; right: -140px;
            animation: orbFloat 11s ease-in-out infinite reverse;
            animation-delay: -4s;
        }
        .orb-3 {
            width: 320px; height: 320px;
            background: radial-gradient(circle at 50% 50%, rgba(244, 63, 94, 0.26), transparent 65%);
            top: 55%; left: 55%;
            animation: orbFloat 7s ease-in-out infinite;
            animation-delay: -7s;
        }
        .orb-4 {
            width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(34, 211, 238, 0.2), transparent 65%);
            top: 20%; right: 20%;
            animation: orbFloat 13s ease-in-out infinite;
            animation-delay: -2s;
        }
        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25%       { transform: translate(20px, -25px) scale(1.04); }
            50%       { transform: translate(-15px, 15px) scale(0.97); }
            75%       { transform: translate(25px, 10px) scale(1.02); }
        }

        /* Grid overlay */
        .grid {
            position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
            background-size: 48px 48px;
        }

        /* Floating book particles */
        .particle {
            position: absolute;
            font-size: 20px;
            opacity: 0;
            animation: particleDrift linear infinite;
            pointer-events: none;
            user-select: none;
        }
        @keyframes particleDrift {
            0%   { opacity: 0; transform: translateY(100vh) rotate(0deg); }
            10%  { opacity: 0.12; }
            90%  { opacity: 0.08; }
            100% { opacity: 0; transform: translateY(-10vh) rotate(360deg); }
        }

        /* ── Card ── */
        .card {
            position: relative; z-index: 10;
            width: 430px;
            background: var(--glass-bg);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 48px 44px 40px;
            box-shadow:
                0 40px 80px rgba(0, 0, 0, 0.6),
                0 0 0 1px rgba(255, 255, 255, 0.04) inset,
                0 1px 0 rgba(255, 255, 255, 0.07) inset;
            animation: cardAppear 0.65s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }
        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(36px) scale(0.93); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Top glow line */
        .card::before {
            content: '';
            position: absolute;
            top: -1px; left: 40px; right: 40px; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(124, 58, 237, 0.6), rgba(14, 165, 233, 0.6), transparent);
            border-radius: 1px;
        }

        /* ── Logo ── */
        .logo {
            text-align: center;
            margin-bottom: 36px;
        }
        .logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 76px; height: 76px;
            border-radius: 22px;
            background: linear-gradient(140deg, #7c3aed 0%, #0ea5e9 100%);
            font-size: 34px;
            margin-bottom: 18px;
            box-shadow:
                0 16px 36px rgba(124, 58, 237, 0.48),
                0 0 0 1px rgba(255,255,255,0.12) inset;
            animation: iconFloat 3.5s ease-in-out infinite;
        }
        @keyframes iconFloat {
            0%, 100% { transform: translateY(0) rotate(-1deg); }
            50%       { transform: translateY(-7px) rotate(1deg); }
        }
        .logo h1 {
            font-size: 22px; font-weight: 700;
            color: var(--text);
            letter-spacing: -0.6px;
            line-height: 1.25;
        }
        .logo-sub {
            margin-top: 5px;
            font-size: 12px; font-weight: 400;
            color: var(--text-muted);
            letter-spacing: 1.2px;
            text-transform: uppercase;
        }

        /* ── Tabs ── */
        .tabs {
            display: flex;
            background: rgba(255,255,255,0.042);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 14px;
            padding: 4px;
            margin-bottom: 30px;
            gap: 4px;
        }
        .tab {
            flex: 1;
            padding: 11px 18px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 13.5px; font-weight: 500;
            font-family: 'Inter', 'Microsoft YaHei', sans-serif;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.28s ease;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.3px;
        }
        .tab.active {
            background: linear-gradient(135deg, #7c3aed 0%, #0ea5e9 100%);
            color: #fff;
            box-shadow: 0 4px 18px rgba(124, 58, 237, 0.42);
        }
        .tab:not(.active):hover {
            color: rgba(255,255,255,0.6);
            background: rgba(255,255,255,0.05);
        }
        /* Shimmer on hover */
        .tab.active::after {
            content: '';
            position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.14), transparent);
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer {
            0%   { left: -100%; }
            100% { left: 200%; }
        }

        /* ── Panels ── */
        .panel { display: none; }
        .panel.active {
            display: block;
            animation: panelIn 0.3s ease both;
        }
        @keyframes panelIn {
            from { opacity: 0; transform: translateX(12px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        /* ── Alert ── */
        .alert {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 13.5px; font-weight: 500;
            margin-bottom: 22px;
        }
        .alert.visible { display: flex; animation: alertPop 0.3s ease both; }
        @keyframes alertPop {
            from { opacity: 0; transform: translateY(-8px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        .alert.success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.22);
            color: #86efac;
        }
        .alert.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.22);
            color: #fca5a5;
        }
        .alert-icon {
            flex-shrink: 0;
            width: 20px; height: 20px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 700;
        }
        .alert.success .alert-icon { background: rgba(34,197,94,0.2); color: #22c55e; }
        .alert.error   .alert-icon { background: rgba(239,68,68,0.2); color: #ef4444; }

        /* ── Input Group ── */
        .field {
            margin-bottom: 20px;
        }
        .field label {
            display: block;
            font-size: 11.5px; font-weight: 600;
            color: rgba(255,255,255,0.42);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 9px;
        }
        .input-wrap {
            position: relative;
        }
        .input-icon {
            position: absolute;
            left: 15px; top: 50%;
            transform: translateY(-50%);
            width: 17px; height: 17px;
            color: rgba(255,255,255,0.25);
            pointer-events: none;
            transition: color 0.25s;
        }
        .input-wrap input {
            width: 100%;
            padding: 13.5px 15px 13.5px 44px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 12px;
            color: var(--text);
            font-size: 14px;
            font-family: 'Inter', 'Microsoft YaHei', sans-serif;
            outline: none;
            transition: all 0.25s ease;
        }
        .input-wrap input::placeholder { color: rgba(255,255,255,0.18); }
        .input-wrap input:focus {
            background: rgba(124, 58, 237, 0.07);
            border-color: var(--input-focus-border);
            box-shadow: 0 0 0 3.5px var(--input-focus-shadow);
        }
        .input-wrap input:focus ~ .input-icon {
            color: rgba(124, 58, 237, 0.6);
        }
        .input-wrap:has(input:focus) .input-icon {
            color: rgba(139, 92, 246, 0.7);
        }

        /* ── Submit button ── */
        .btn-submit {
            width: 100%;
            padding: 14.5px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #7c3aed 0%, #0ea5e9 100%);
            color: #fff;
            font-size: 15px; font-weight: 600;
            font-family: 'Inter', 'Microsoft YaHei', sans-serif;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            margin-top: 8px;
            letter-spacing: 0.8px;
        }
        .btn-submit::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, #8b5cf6 0%, #38bdf8 100%);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .btn-submit::after {
            content: '';
            position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.13), transparent);
            transition: 0.55s;
        }
        .btn-submit:not(:disabled):hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(124, 58, 237, 0.48); }
        .btn-submit:not(:disabled):hover::before { opacity: 1; }
        .btn-submit:not(:disabled):hover::after { left: 200%; }
        .btn-submit:not(:disabled):active { transform: translateY(0); box-shadow: none; }
        .btn-submit:disabled {
            opacity: 0.65;
            cursor: not-allowed;
            transform: none;
        }
        .btn-submit span { position: relative; z-index: 1; }

        /* ── Footer ── */
        .card-foot {
            margin-top: 24px;
            text-align: center;
            font-size: 11.5px;
            color: rgba(255,255,255,0.18);
            letter-spacing: 0.3px;
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .card { width: 92vw; padding: 36px 28px 32px; }
        }
    </style>
</head>
<body>

<!-- Background -->
<div class="bg-layer">
    <div class="bg-gradient"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
    <div class="grid"></div>
</div>

<!-- Floating particles (JS generated) -->

<!-- Card -->
<div class="card">
    <!-- Logo -->
    <div class="logo">
        <div class="logo-icon">📚</div>
        <h1>图书管理系统</h1>
        <p class="logo-sub">Library Management System</p>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab active" id="tab-login"    onclick="switchTab('login')">登&ensp;录</button>
        <button class="tab"        id="tab-register" onclick="switchTab('register')">注&ensp;册</button>
    </div>

    <!-- ── Login Panel ── -->
    <div id="panel-login" class="panel active">
        <div id="alert-login" class="alert">
            <div class="alert-icon" id="alert-login-icon"></div>
            <span id="alert-login-msg"></span>
        </div>

        <div class="field">
            <label>用户名</label>
            <div class="input-wrap">
                <input type="text" id="login-user" placeholder="请输入用户名" autocomplete="username">
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
            </div>
        </div>

        <div class="field">
            <label>密&emsp;码</label>
            <div class="input-wrap">
                <input type="password" id="login-pass" placeholder="请输入密码" autocomplete="current-password">
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
            </div>
        </div>

        <button class="btn-submit" id="btn-login" onclick="doLogin()">
            <span>登&ensp;&ensp;录</span>
        </button>
    </div>

    <!-- ── Register Panel ── -->
    <div id="panel-register" class="panel">
        <div id="alert-register" class="alert">
            <div class="alert-icon" id="alert-register-icon"></div>
            <span id="alert-register-msg"></span>
        </div>

        <div class="field">
            <label>用户名</label>
            <div class="input-wrap">
                <input type="text" id="reg-user" placeholder="请设置用户名（至少 3 位）" autocomplete="username">
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
            </div>
        </div>

        <div class="field">
            <label>密&emsp;码</label>
            <div class="input-wrap">
                <input type="password" id="reg-pass" placeholder="请设置密码（至少 6 位）" autocomplete="new-password">
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
            </div>
        </div>

        <div class="field">
            <label>确认密码</label>
            <div class="input-wrap">
                <input type="password" id="reg-confirm" placeholder="请再次输入密码" autocomplete="new-password">
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
            </div>
        </div>

        <button class="btn-submit" id="btn-register" onclick="doRegister()">
            <span>注&ensp;&ensp;册</span>
        </button>
    </div>

    <p class="card-foot">&copy; 2026 图书管理系统 · 保留所有权利</p>
</div>

<script>
    /* ─── Floating particles ─── */
    const emojis = ['📚','📖','📕','📗','📘','📙','✏️','🔖'];
    for (let i = 0; i < 12; i++) {
        const el = document.createElement('div');
        el.className = 'particle';
        el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        el.style.cssText = `
            left: ${Math.random() * 100}%;
            font-size: ${14 + Math.random() * 18}px;
            animation-duration: ${12 + Math.random() * 16}s;
            animation-delay: ${-Math.random() * 20}s;
        `;
        document.querySelector('.bg-layer').appendChild(el);
    }

    /* ─── Auth status check on load ─── */
    fetch('/api/auth/status')
        .then(r => r.json())
        .then(d => {
            if (d.loggedIn) {
                location.replace(d.role === 'admin' ? '/management.html' : '/reader.html');
            }
        })
        .catch(() => {});

    /* ─── Tab switching ─── */
    function switchTab(tab) {
        ['login','register'].forEach(t => {
            document.getElementById('tab-' + t).classList.toggle('active', t === tab);
            document.getElementById('panel-' + t).classList.toggle('active', t === tab);
        });
        hideAlert('login');
        hideAlert('register');
    }

    /* ─── Alert helpers ─── */
    function showAlert(panel, msg, type) {
        const box  = document.getElementById('alert-' + panel);
        const icon = document.getElementById('alert-' + panel + '-icon');
        const text = document.getElementById('alert-' + panel + '-msg');
        icon.textContent = type === 'success' ? '✓' : '✕';
        text.textContent = msg;
        box.className = 'alert ' + type + ' visible';
        if (type === 'success') setTimeout(() => hideAlert(panel), 4000);
    }
    function hideAlert(panel) {
        document.getElementById('alert-' + panel).className = 'alert';
    }

    /* ─── Button loading state ─── */
    function setLoading(btnId, on, label) {
        const b = document.getElementById(btnId);
        b.disabled = on;
        b.querySelector('span').textContent = on ? '请 稍 候 …' : label;
    }

    /* ─── Login ─── */
    function doLogin() {
        hideAlert('login');
        const username = document.getElementById('login-user').value.trim();
        const password = document.getElementById('login-pass').value;
        if (!username || !password) { showAlert('login', '请输入用户名和密码', 'error'); return; }

        setLoading('btn-login', true, '登　　录');
        fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password }),
            credentials: 'include'
        })
        .then(r => r.json())
        .then(d => {
            if (d.success) {
                showAlert('login', '登录成功，正在跳转 …', 'success');
                const target = d.role === 'admin' ? '/management.html' : '/reader.html';
                setTimeout(() => location.replace(target), 900);
            } else {
                showAlert('login', d.message || '用户名或密码错误', 'error');
                setLoading('btn-login', false, '登　　录');
            }
        })
        .catch(() => {
            showAlert('login', '网络异常，请稍后再试', 'error');
            setLoading('btn-login', false, '登　　录');
        });
    }

    /* ─── Register ─── */
    function doRegister() {
        hideAlert('register');
        const username = document.getElementById('reg-user').value.trim();
        const password = document.getElementById('reg-pass').value;
        const confirm  = document.getElementById('reg-confirm').value;

        if (!username || !password || !confirm) { showAlert('register', '请填写完整的注册信息', 'error'); return; }
        if (username.length < 3) { showAlert('register', '用户名至少需要 3 个字符', 'error'); return; }
        if (password.length < 6) { showAlert('register', '密码至少需要 6 位', 'error'); return; }
        if (password !== confirm) { showAlert('register', '两次输入的密码不一致', 'error'); return; }

        setLoading('btn-register', true, '注　　册');
        fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        })
        .then(r => r.json())
        .then(d => {
            if (d.success) {
                showAlert('register', '注册成功！即将跳转到登录页 …', 'success');
                setTimeout(() => {
                    ['reg-user','reg-pass','reg-confirm'].forEach(id => document.getElementById(id).value = '');
                    switchTab('login');
                    showAlert('login', '注册成功，请使用新账号登录', 'success');
                }, 1600);
            } else {
                showAlert('register', d.message || '注册失败，请重试', 'error');
            }
            setLoading('btn-register', false, '注　　册');
        })
        .catch(() => {
            showAlert('register', '网络异常，请稍后再试', 'error');
            setLoading('btn-register', false, '注　　册');
        });
    }

    /* ─── Enter key support ─── */
    document.addEventListener('keydown', e => {
        if (e.key !== 'Enter') return;
        if (document.getElementById('panel-login').classList.contains('active')) doLogin();
        else doRegister();
    });
</script>
</body>
</html>
