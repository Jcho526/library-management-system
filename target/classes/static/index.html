<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图书管理系统 - 登录 / 注册</title>
    <meta name="description" content="图书管理系统 - 请登录或注册以使用完整功能">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0; padding: 0; box-sizing: border-box;
        }

        :root {
            --bg: #f3efe8;
            --surface: #fffdf9;
            --text: #2c2416;
            --text-muted: #7a7060;
            --accent: #7b4a2c;
            --accent-hover: #5c3a1e;
            --border: #d4cdbf;
            --border-light: #e8e2d5;
            --shadow: 0 1px 3px rgba(60, 40, 20, 0.06), 0 4px 24px rgba(60, 40, 20, 0.08);
            --shadow-lg: 0 2px 8px rgba(60, 40, 20, 0.08), 0 8px 40px rgba(60, 40, 20, 0.12);
            --success: #4a7c59;
            --danger: #b8453a;
        }

        body {
            font-family: 'Georgia', 'Noto Serif SC', 'STSong', 'SimSun', 'Songti SC', serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f3efe8;
            position: relative;
        }

        /* Warm paper-texture background */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 0;
            background:
                radial-gradient(ellipse at 30% 20%, rgba(139, 105, 60, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 80%, rgba(139, 105, 60, 0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 50%, rgba(200, 180, 150, 0.03) 0%, transparent 70%);
            pointer-events: none;
        }

        /* Subtle grid overlay — like library shelf lines */
        body::after {
            content: '';
            position: fixed; inset: 0; z-index: 0;
            background-image:
                repeating-linear-gradient(0deg, transparent, transparent 80px, rgba(139, 105, 60, 0.03) 80px, rgba(139, 105, 60, 0.03) 81px),
                repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(139, 105, 60, 0.02) 80px, rgba(139, 105, 60, 0.02) 81px);
            pointer-events: none;
        }

        /* ── Card ── */
        .card {
            position: relative; z-index: 10;
            width: 430px;
            background: var(--surface);
            border: 1px solid var(--border-light);
            border-radius: 2px;
            padding: 48px 44px 40px;
            box-shadow: var(--shadow-lg);
            animation: cardAppear 0.6s cubic-bezier(0.34, 1.2, 0.64, 1) both;
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Subtle top accent line */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 3px;
            background: var(--accent);
            border-radius: 2px 2px 0 0;
        }

        /* ── Logo ── */
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 72px; height: 72px;
            border-radius: 2px;
            background: var(--accent);
            color: #fff;
            font-size: 32px;
            margin-bottom: 16px;
            box-shadow: 0 4px 16px rgba(123, 74, 44, 0.25);
        }
        @keyframes iconFloat {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-4px); }
        }
        .logo-icon { animation: iconFloat 4s ease-in-out infinite; }
        .logo h1 {
            font-size: 22px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: 0.02em;
        }
        .logo p {
            color: var(--text-muted);
            font-size: 13px;
            margin-top: 6px;
            font-style: italic;
        }

        /* ── Tabs ── */
        .tabs {
            display: flex;
            border-bottom: 2px solid var(--border-light);
            margin-bottom: 28px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-muted);
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: color 0.2s, border-color 0.2s;
            font-weight: 500;
            letter-spacing: 0.03em;
        }
        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
            font-weight: 600;
        }
        .tab:hover { color: var(--accent); }

        /* ── Form ── */
        .field {
            margin-bottom: 18px;
        }
        .field label {
            display: block;
            margin-bottom: 6px;
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 600;
        }
        .field input {
            width: 100%;
            padding: 11px 14px;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 2px;
            font-size: 14px;
            color: var(--text);
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }
        .field input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(123, 74, 44, 0.08);
        }
        .field input::placeholder {
            color: #c4b9a8;
        }

        /* ── Submit ── */
        .btn-submit {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 2px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.04em;
            transition: background 0.2s, transform 0.1s;
            font-family: inherit;
        }
        .btn-submit:hover { background: var(--accent-hover); }
        .btn-submit:active { transform: translateY(1px); }

        /* ── Alert ── */
        .alert {
            display: none;
            padding: 10px 14px;
            border-radius: 2px;
            margin-bottom: 16px;
            font-size: 13px;
            border-left: 3px solid;
        }
        .alert.success {
            background: #f0f5f1;
            border-color: var(--success);
            color: #3a5c45;
        }
        .alert.error {
            background: #fdf3f1;
            border-color: var(--danger);
            color: #8b342c;
        }

        /* ── Card foot ── */
        .card-foot {
            text-align: center;
            margin-top: 18px;
            font-size: 12px;
            color: var(--text-muted);
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .card {
                width: 92%;
                padding: 36px 28px 30px;
            }
        }

        /* Clean up old particle/bg elements if they exist */
        .bg-layer, .bg-gradient, .orb, .grid, .particle {
            display: none;
        }
    
        /* ── Panel (login/register) ── */
        .panel { display: none; }
        .panel.active { display: block; }

        /* ── Input wrapper with icon ── */
        .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-wrap input {
            width: 100%;
            padding: 11px 14px 11px 40px;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 2px;
            font-size: 14px;
            color: var(--text);
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }
        .input-wrap input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(123, 74, 44, 0.08);
        }
        .input-wrap input::placeholder { color: #c4b9a8; }
        .input-icon {
            position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
            width: 18px; height: 18px; color: #b0a590;
        }

        /* ── Logo subtitle ── */
        .logo-sub {
            color: var(--text-muted);
            font-size: 12px;
            margin-top: 4px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        /* ── Alert icon ── */
        .alert-icon { display: inline-block; margin-right: 6px; font-weight: bold; }

    </style>
</head>
<body>

<!-- Card -->
<div class="card">
    <!-- Logo -->
    <div class="logo">
        <div class="logo-icon">&#x2766;</div>
        <h1>图书管理系统</h1>
        <p class="logo-sub">Library Management System</p>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab active" id="tab-login"    onclick="switchTab('login')">登&ensp;录</button>
        <button class="tab"        id="tab-register" onclick="switchTab('register')">注&ensp;册</button>
    </div>

    <!-- ── Login Panel ── -->
    <div id="panel-login" class="panel active">
        <div id="alert-login" class="alert">
            <div class="alert-icon" id="alert-login-icon"></div>
            <span id="alert-login-msg"></span>
        </div>

        <div class="field">
            <label>用户名</label>
            <div class="input-wrap">
                <input type="text" id="login-user" placeholder="请输入用户名" autocomplete="username">
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
            </div>
        </div>

        <div class="field">
            <label>密&emsp;码</label>
            <div class="input-wrap">
                <input type="password" id="login-pass" placeholder="请输入密码" autocomplete="current-password">
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
            </div>
        </div>

        <button class="btn-submit" id="btn-login" onclick="doLogin()">
            <span>登&ensp;&ensp;录</span>
        </button>
    </div>

    <!-- ── Register Panel ── -->
    <div id="panel-register" class="panel">
        <div id="alert-register" class="alert">
            <div class="alert-icon" id="alert-register-icon"></div>
            <span id="alert-register-msg"></span>
        </div>

        <div class="field">
            <label>用户名</label>
            <div class="input-wrap">
                <input type="text" id="reg-user" placeholder="请设置用户名（至少 3 位）" autocomplete="username">
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
            </div>
        </div>

        <div class="field">
            <label>密&emsp;码</label>
            <div class="input-wrap">
                <input type="password" id="reg-pass" placeholder="请设置密码（至少 6 位）" autocomplete="new-password">
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
            </div>
        </div>

        <div class="field">
            <label>确认密码</label>
            <div class="input-wrap">
                <input type="password" id="reg-confirm" placeholder="请再次输入密码" autocomplete="new-password">
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
            </div>
        </div>

        <button class="btn-submit" id="btn-register" onclick="doRegister()">
            <span>注&ensp;&ensp;册</span>
        </button>
    </div>

    <p class="card-foot">&copy; 2026 图书管理系统 · 保留所有权利</p>
</div>

<script>
    /* ─── Floating particles ─── */
    const emojis = ['&#x2766;','&#x25C6;','&#x25C6;','&#x25C6;','&#x25C6;','&#x25C6;','&#x270E;','&#x2042;'];
    for (let i = 0; i < 12; i++) {
        const el = document.createElement('div');
        el.className = 'particle';
        el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        el.style.cssText = `
            left: ${Math.random() * 100}%;
            font-size: ${14 + Math.random() * 18}px;
            animation-duration: ${12 + Math.random() * 16}s;
            animation-delay: ${-Math.random() * 20}s;
        `;
        document.querySelector('.bg-layer').appendChild(el);
    }

    /* ─── Auth status check on load ─── */
    fetch('/api/auth/status')
        .then(r => r.json())
        .then(d => {
            if (d.loggedIn) {
                location.replace(d.role === 'admin' ? '/management.html' : '/reader.html');
            }
        })
        .catch(() => {});

    /* ─── Tab switching ─── */
    function switchTab(tab) {
        ['login','register'].forEach(t => {
            document.getElementById('tab-' + t).classList.toggle('active', t === tab);
            document.getElementById('panel-' + t).classList.toggle('active', t === tab);
        });
        hideAlert('login');
        hideAlert('register');
    }

    /* ─── Alert helpers ─── */
    function showAlert(panel, msg, type) {
        const box  = document.getElementById('alert-' + panel);
        const icon = document.getElementById('alert-' + panel + '-icon');
        const text = document.getElementById('alert-' + panel + '-msg');
        icon.textContent = type === 'success' ? '&#x2713;' : '&#x2717;';
        text.textContent = msg;
        box.className = 'alert ' + type + ' visible';
        if (type === 'success') setTimeout(() => hideAlert(panel), 4000);
    }
    function hideAlert(panel) {
        document.getElementById('alert-' + panel).className = 'alert';
    }

    /* ─── Button loading state ─── */
    function setLoading(btnId, on, label) {
        const b = document.getElementById(btnId);
        b.disabled = on;
        b.querySelector('span').textContent = on ? '请 稍 候 …' : label;
    }

    /* ─── Login ─── */
    function doLogin() {
        hideAlert('login');
        const username = document.getElementById('login-user').value.trim();
        const password = document.getElementById('login-pass').value;
        if (!username || !password) { showAlert('login', '请输入用户名和密码', 'error'); return; }

        setLoading('btn-login', true, '登　　录');
        fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password }),
            credentials: 'include'
        })
        .then(r => r.json())
        .then(d => {
            if (d.success) {
                showAlert('login', '登录成功，正在跳转 …', 'success');
                const target = d.role === 'admin' ? '/management.html' : '/reader.html';
                setTimeout(() => location.replace(target), 900);
            } else {
                showAlert('login', d.message || '用户名或密码错误', 'error');
                setLoading('btn-login', false, '登　　录');
            }
        })
        .catch(() => {
            showAlert('login', '网络异常，请稍后再试', 'error');
            setLoading('btn-login', false, '登　　录');
        });
    }

    /* ─── Register ─── */
    function doRegister() {
        hideAlert('register');
        const username = document.getElementById('reg-user').value.trim();
        const password = document.getElementById('reg-pass').value;
        const confirm  = document.getElementById('reg-confirm').value;

        if (!username || !password || !confirm) { showAlert('register', '请填写完整的注册信息', 'error'); return; }
        if (username.length < 3) { showAlert('register', '用户名至少需要 3 个字符', 'error'); return; }
        if (password.length < 6) { showAlert('register', '密码至少需要 6 位', 'error'); return; }
        if (password !== confirm) { showAlert('register', '两次输入的密码不一致', 'error'); return; }

        setLoading('btn-register', true, '注　　册');
        fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        })
        .then(r => r.json())
        .then(d => {
            if (d.success) {
                showAlert('register', '注册成功！即将跳转到登录页 …', 'success');
                setTimeout(() => {
                    ['reg-user','reg-pass','reg-confirm'].forEach(id => document.getElementById(id).value = '');
                    switchTab('login');
                    showAlert('login', '注册成功，请使用新账号登录', 'success');
                }, 1600);
            } else {
                showAlert('register', d.message || '注册失败，请重试', 'error');
            }
            setLoading('btn-register', false, '注　　册');
        })
        .catch(() => {
            showAlert('register', '网络异常，请稍后再试', 'error');
            setLoading('btn-register', false, '注　　册');
        });
    }

    /* ─── Enter key support ─── */
    document.addEventListener('keydown', e => {
        if (e.key !== 'Enter') return;
        if (document.getElementById('panel-login').classList.contains('active')) doLogin();
        else doRegister();
    });
</script>
</body>
</html>
